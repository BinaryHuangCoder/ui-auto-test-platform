server:
  port: 8088

spring:
  application:
    name: ui-auto-test-platform
  
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/ui_auto_test?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&allowPublicKeyRetrieval=true
    username: root
    password: 123456
  
  redis:
    host: localhost
    port: 6379
    password: 
    database: 0

# 执行器配置
executor:
  node-path: /usr/local/bin/node
  scripts-dir: /home/administrator/.openclaw/workspace/ui-auto-test-platform/scripts
  executor-script: executor.js
  playwright-browsers-path: /root/.cache/ms-playwright

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.uiauto.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

jwt:
  secret: mySecretKey2024UIAutoTest
  expiration: 86400000
